# hacobot フェイルセーフ層5ノードのメトリクスをスクレイプするPrometheus設定。
#
# 注意: このPrometheusはk3dクラスタ側(infra/)ではなく、edge/docker/のGazebo/ROS2
# コンテナと同じdocker-compose(network_mode: host)側に置いている。理由は、
# Docker Desktop環境ではk3d側からこのホスト上のros2_nav2_containerが公開する
# メトリクスポート(9101-9105)へ到達できないため。Prometheus/Grafanaも
# network_mode: hostにすることで、localhost:9101-9105へ直接スクレイプできる。
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: heartbeat_monitor
    static_configs:
      - targets: ["localhost:9101"]
  - job_name: safety_state_machine
    static_configs:
      - targets: ["localhost:9102"]
  - job_name: watchdog
    static_configs:
      - targets: ["localhost:9103"]
  - job_name: nav2_heartbeat_adapter
    static_configs:
      - targets: ["localhost:9104"]
  - job_name: estop_bridge
    static_configs:
      - targets: ["localhost:9105"]
